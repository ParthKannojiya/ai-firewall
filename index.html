<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Firewall Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-white">

<div class="container mt-4">
    <h1 class="text-center">🔥 AI Firewall Dashboard</h1>

    <!-- Test Panel -->
    <div class="card p-3 mt-4 bg-secondary">
        <h4>🧪 Test Firewall</h4>
        <input id="req" type="number" placeholder="Requests" class="form-control mb-2">
        <input id="fail" type="number" placeholder="Failed Logins" class="form-control mb-2">
        <input id="url" type="text" placeholder="URL" class="form-control mb-2">
        <button onclick="sendRequest()" class="btn btn-danger">🚀 Send Request</button>
        <p id="result" class="mt-2"></p>
    </div>

    <!-- Metrics -->
    <div class="row mt-4">
        <div class="col">
            <div class="card p-3 bg-success">Total Attacks: <span id="attacks">0</span></div>
        </div>
        <div class="col">
            <div class="card p-3 bg-primary">Normal Traffic: <span id="normal">0</span></div>
        </div>
    </div>

    <!-- Chart -->
    <div class="mt-4">
        <canvas id="attackChart"></canvas>
    </div>

    <!-- Logs -->
    <div class="mt-4">
        <h4>📋 Logs</h4>
        <table class="table table-dark table-striped" id="logsTable"></table>
    </div>

    <!-- Map -->
    <div class="mt-4">
        <h4>🌍 Attack Map</h4>
        <div id="map" style="height:400px;"></div>
    </div>
</div>

<!-- Scripts at END (IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>
</html>
